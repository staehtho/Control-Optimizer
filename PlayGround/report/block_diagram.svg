                <text class="text" x="0" y="65" style="font-size:10px; text-anchor:start">min: -5.0</text>
            </g>
        </defs>

        <!-- Sum -->
        <g transform="translate(0 0)">
            <!-- Sum -->
            <circle class="block" cx="0" cy="0" r="5"/>

            <!-- Output -->
            <path class="line" d="M5 0 H45"/>
            <use href="#arrow__m2" transform="translate(50, 0)"/>
        </g>

        <!-- Output -->
