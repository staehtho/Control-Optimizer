                <text class="text" x="25" y="30">Td</text>
            </g>

            <path class="line" d="M50 0 H95"/>
            <use href="#arrow__m4" transform="translate(100, 0)"/>

            <!-- Filter and differentiator -->
            <g transform="translate(100, -25)">
