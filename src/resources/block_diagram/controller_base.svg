<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 550 300">

    <style>
        .fill { fill:#000000 }
        .line { stroke:#000000; stroke-width:2; fill:none; }
        .block { stroke:#000000; stroke-width:2; fill:#ffffff; }
    </style>

    <!-- Arrow -->
    <defs>
        <path id="arrow" class="fill" d=" M0 0 L-5 2 L-5 -2" transform="scale(1.5)"/>
    </defs>

    <!-- Rect -->
    <defs>
        <rect id="rect" class="block" width="50" height="50"/>
    </defs>

    <!-- Block -->
    <defs>
        <path id="block" class="block" d="M0 0 L0 50 L50 25 Z"/>
    </defs>

    <!-- Integrator -->
    <defs>
        <g id="integrator">
            <use href="#rect"/>
            <text class="text" x="25" y="17.5">1</text>
            <path class="line" d="M17.5 25 H32.5"/>
            <text class="text" x="25" y="40">s</text>
        </g>
    </defs>

    <!-- Differentiator -->
    <defs>
        <g id="differentiator">
            <use href="#rect"/>
            <text class="text" x="25" y="30">s</text>
        </g>
    </defs>

    <!-- Constraint -->
    <defs>
        <g id="constraint">
            <use href="#rect"/>
            <path class="line" d="M7 40 H20 L30 10 H43"/>
            <path class="line" d="M5 25 H45" style="stroke-width:0.7"/>
            <path class="line" d="M25 5 V45" style="stroke-width:0.7"/>
        </g>
    </defs>


    <!-- Input -->
    <g transform="translate(0, 125)">
        <path class="line" d="M0 0 H75"/>
        <!-- Node -->
        <circle class="fill" cx="75" cy="0" r="4"/>
    </g>


    <!-- Sum -->
    <g transform="translate(400 125)">
        <!-- Sum -->
        <circle class="block" cx="0" cy="0" r="5"/>

        <!-- Output -->
        <path class="line" d="M5 0 H45"/>
        <use href="#arrow" transform="translate(50, 0)"/>
    </g>

    <!-- Output -->
    <g transform="translate(450 125)">
        <use href="#constraint" transform="translate(0 -25)"/>
        <path class="line" d="M50 0 H95" />
        <use href="#arrow" transform="translate(100 0)"/>
    </g>
</svg>