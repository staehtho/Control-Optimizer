<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 800 300">

    <style>
        .fill { fill:#000000 }
        .line { stroke:#000000; stroke-width:2; fill:none; }
        .block { stroke:#000000; stroke-width:2; fill:none; }
        .text { fill:#000000; font-family:Arial, sans-serif; font-size:14px; text-anchor:middle;
        dominant-baseline:middle; }
    </style>

    <!-- Arrow -->
    <defs>
        <path id="arrow" class="fill" d=" M0 0 L-5 2 L-5 -2" transform="scale(1.5)"/>
    </defs>


    <!-- Input -->
    <path class="line" d="M0 125 H90" />

    <!-- sum -->
    <g transform="translate(100 125)">
        <circle class="block" cx="0" cy="0" r="5"/>
        <use href="#arrow" transform="translate(-5 0)"/>
        <use href="#arrow" transform="translate(0 5) rotate(-90 0 0)"/>
        <line class="line" x1="-5" y1="10" x2="-10" y2="10"/>
    </g>

    <!-- Plant -->
    <g transform="translate(550 125)">
        <rect class="block" height="50" width="100" x="0" y="-25"/>
        <text class="text" x="50" y="0" >G(s)</text>
    </g>

    <!-- Output -->
    <path class="line" d="M650 125 H745 M700 125 V250 H100 V135" />
    <use href="#arrow" transform="translate(750 125)"/>
    <!-- Node -->
    <circle class="fill" cx="700" cy="125" r="4"/>
</svg>