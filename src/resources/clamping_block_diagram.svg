<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 700 250">

    <style>
        .fill { fill:#000000 }
        .line { stroke:#000000; stroke-width:2; fill:none; }
        .block { stroke:#000000; stroke-width:2; fill:#ffffff; }
    </style>

    <!-- Arrow -->
    <defs>
        <path id="arrow" class="fill" d=" M0 0 L-5 2 L-5 -2" transform="scale(1.5)"/>
    </defs>

    <!-- Rect -->
    <defs>
        <rect id="rect" class="block" width="50" height="50"/>
    </defs>


    <!-- Constraint -->
    <defs>
        <g id="constraint">
            <use href="#rect"/>
            <path class="line" d="M7 40 H20 L30 10 H43"/>
            <path class="line" d="M5 25 H45" style="stroke-width:0.7"/>
            <path class="line" d="M25 5 V45" style="stroke-width:0.7"/>
        </g>
    </defs>

    <g transform="translate(300 200)">
        <use href="#constraint" transform="translate(0 -25)" />
        <use href="#arrow" transform="translate(0 0)" />
    </g>

</svg>